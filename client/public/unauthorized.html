<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Access denied — BDI Central Hub</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f4f5f7; color: #1a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #17181b; color: #e8e8e8; }
      .card { background: #212327; box-shadow: none; }
    }
    .card {
      max-width: 30rem; margin: 1.5rem; padding: 2.5rem 2.25rem;
      background: #fff; border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,.08);
      text-align: center;
    }
    h1 { font-size: 1.4rem; margin: 0 0 .75rem; }
    p { line-height: 1.55; margin: .5rem 0; opacity: .85; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Access denied</h1>
    <p>Your account isn't authorized to use the BDI Central Hub. This app is limited
       to Brewer Direct employee accounts — guest and external accounts don't have access.</p>
    <p>If you believe this is a mistake, contact your IT administrator.</p>
    <p><a href="/.auth/logout">Sign out</a></p>
  </main>
</body>
</html>
